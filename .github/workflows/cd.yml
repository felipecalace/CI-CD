name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy na EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |

            docker rm -f spring-api || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/spring-api:latest

            docker run -d \
              --name spring-api \
              --restart always \
              -p 8080:8080 \
              ${{ secrets.DOCKER_USERNAME }}/spring-api:latest

            echo "Deploy finalizado com sucesso!"